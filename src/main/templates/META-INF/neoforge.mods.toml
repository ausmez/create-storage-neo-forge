modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"
issueTrackerURL = "https://github.com/ausmez/create-storage-neo-forge/issues"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
#updateJSONURL=""
displayURL = "${mod_url}"
logoFile = "${mod_icon}"
authors = "${mod_authors}"
description = '''${mod_description}'''

[[mixins]]
config = "${mod_id}.mixins.json"

[[dependencies.${ mod_id }]]
modId = "neoforge"
type = "required"
versionRange = "${neo_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.${ mod_id }]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.${ mod_id }]]
modId = "create"
type = "required"
versionRange = "[6.0.7,6.1.0)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.${ mod_id }]]
modId = "curios"
type = "optional"
versionRange = "[9.2.0,10)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${ mod_id }]]
modId = "vanillabackport"
type = "optional"
versionRange = "[1,2)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.${ mod_id }]]
modId = "constructionstick"
type = "optional"
versionRange = "[1.3.0,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${ mod_id }]]
modId = "sable"
type = "optional"
versionRange = "[1.1.0,)"
ordering = "AFTER"
side = "BOTH"
